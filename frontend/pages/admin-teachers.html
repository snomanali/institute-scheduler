<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Teachers — Admin</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <span class="page-title" id="pageTitle">Teachers</span>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="openAddModal()">+ Add Teacher</button>
      </div>
    </div>
    <div class="page">
      <div class="card">
        <div class="card-body">
          <div id="teacherList"><p class="text-muted">Loading…</p></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Teacher Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header"><h3>Add New Teacher</h3><button class="modal-close" onclick="closeAddModal()">×</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Full Name *</label><input type="text" class="form-control" id="tName" placeholder="Mr. John Smith"></div>
        <div class="form-group"><label>Email *</label><input type="email" class="form-control" id="tEmail" placeholder="teacher@school.com"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Password *</label><input type="password" class="form-control" id="tPass" placeholder="Min 8 chars + number"></div>
        <div class="form-group"><label>Phone</label><input type="text" class="form-control" id="tPhone" placeholder="+92300…"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Weekly Off Day</label>
          <select class="form-control" id="tOff">
            <option value="friday" selected>Friday</option>
            <option value="saturday">Saturday</option>
            <option value="sunday">Sunday</option>
            <option value="monday">Monday</option>
          </select>
        </div>
        <div class="form-group"><label>Max Hours/Day</label><input type="number" class="form-control" id="tHours" value="8" min="1" max="12"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" id="addBtn" onclick="addTeacher()">Add Teacher</button>
    </div>
  </div>
</div>

<!-- Expertise Modal -->
<div class="modal-overlay" id="expModal">
  <div class="modal">
    <div class="modal-header"><h3 id="expTitle">Manage Expertise</h3><button class="modal-close" onclick="closeExpModal()">×</button></div>
    <div class="modal-body">
      <div id="currentExp"><p class="text-muted">Loading…</p></div>
      <div class="divider"></div>
      <h4 style="font-size:0.88rem;margin-bottom:12px">Add Subject</h4>
      <div class="form-row">
        <div class="form-group">
          <label>Subject</label>
          <select class="form-control" id="expSubject"></select>
        </div>
        <div class="form-group">
          <label>Proficiency</label>
          <select class="form-control" id="expProf">
            <option value="primary">Primary</option>
            <option value="secondary">Secondary</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="addExpertise()">Add Expertise</button>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/layout.js"></script>
<script>
initPage('admin','admin-teachers.html','Teachers');
let currentTeacherId = null;

async function loadTeachers() {
  try {
    const res = await API.get('/teachers');
    const el  = document.getElementById('teacherList');
    if (!res.data.length) { el.innerHTML = '<div class="empty-state"><div class="icon">👩‍🏫</div><p>No teachers added yet</p></div>'; return; }
    el.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>Name</th><th>Email</th><th>Code</th><th>Off Day</th><th>Max Hrs</th><th>Subjects</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${res.data.map(t => `
        <tr>
          <td><strong>${t.full_name}</strong></td>
          <td>${t.email}</td>
          <td>${t.employee_code||'—'}</td>
          <td style="text-transform:capitalize">${t.weekly_off_day||'—'}</td>
          <td>${t.max_hours_per_day}h</td>
          <td>${(t.expertise||[]).map(e=>`<span class="badge badge-blue">${e.subjectName}</span>`).join(' ')||'—'}</td>
          <td>${t.is_active ? '<span class="badge badge-green">Active</span>' : '<span class="badge badge-red">Inactive</span>'}</td>
          <td>
            <button class="btn btn-sm btn-outline" onclick="openExpModal('${t.id}','${t.full_name}')">Subjects</button>
          </td>
        </tr>`).join('')}
      </tbody></table></div>`;
  } catch(e) { UI.toast('Failed to load teachers','error'); }
}

function openAddModal()  { document.getElementById('addModal').classList.add('open'); }
function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }

async function addTeacher() {
  const btn = document.getElementById('addBtn');
  const body = {
    email:    document.getElementById('tEmail').value.trim(),
    password: document.getElementById('tPass').value,
    role:     'teacher',
    fullName: document.getElementById('tName').value.trim(),
    phone:    document.getElementById('tPhone').value.trim() || undefined,
  };
  if (!body.email || !body.password || !body.fullName) { UI.toast('Fill all required fields','error'); return; }
  UI.loading(btn, true);
  try {
    await API.post('/auth/users', body);
    UI.toast('Teacher added successfully','success');
    closeAddModal(); loadTeachers();
  } catch(e) { UI.toast(e.message,'error'); }
  finally { UI.loading(btn, false); }
}

async function openExpModal(teacherId, name) {
  currentTeacherId = teacherId;
  document.getElementById('expTitle').textContent = `Subjects — ${name}`;
  document.getElementById('expModal').classList.add('open');
  await loadSubjectsForExp();
  await loadCurrentExpertise(teacherId);
}
function closeExpModal() { document.getElementById('expModal').classList.remove('open'); }

async function loadSubjectsForExp() {
  const res = await API.get('/courses/subjects');
  document.getElementById('expSubject').innerHTML =
    res.data.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}

async function loadCurrentExpertise(teacherId) {
  const res = await API.get(`/teachers/${teacherId}`);
  const exp = res.data.expertise || [];
  document.getElementById('currentExp').innerHTML = exp.length
    ? exp.map(e=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--rule)">
          <span><strong>${e.subjectName}</strong> <span class="badge badge-blue">${e.proficiency}</span></span>
          <button class="btn btn-sm btn-danger" onclick="removeExpertise('${teacherId}','${e.subjectId}')">Remove</button>
        </div>`).join('')
    : '<p class="text-muted">No subjects assigned yet</p>';
}

async function addExpertise() {
  const subjectId   = document.getElementById('expSubject').value;
  const proficiency = document.getElementById('expProf').value;
  try {
    await API.post(`/teachers/${currentTeacherId}/expertise`, { subjectId, proficiency });
    UI.toast('Expertise added','success');
    loadCurrentExpertise(currentTeacherId); loadTeachers();
  } catch(e) { UI.toast(e.message,'error'); }
}

async function removeExpertise(teacherId, subjectId) {
  try {
    await API.delete(`/teachers/${teacherId}/expertise/${subjectId}`);
    UI.toast('Expertise removed','success');
    loadCurrentExpertise(teacherId); loadTeachers();
  } catch(e) { UI.toast(e.message,'error'); }
}

loadTeachers();
</script>
</body>
</html>
