<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Institute Schedule Manager</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <h1>📅 Institute Scheduler</h1>
      <p>Sign in to your account</p>
    </div>
    <div class="login-error" id="loginError"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" class="form-control" id="email" placeholder="admin@institute.com" autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" class="form-control" id="password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" id="loginBtn" onclick="doLogin()">
      Sign In
    </button>
    <p class="text-muted mt-2" style="text-align:center;font-size:0.78rem">
      Admin: admin@institute.com / Teacher: teacher1@institute.com
    </p>
  </div>
</div>
<script src="js/config.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.user()) {
    window.location.href = Auth.role() === 'admin'
      ? 'pages/admin-dashboard.html'
      : 'pages/teacher-dashboard.html';
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const btn   = document.getElementById('loginBtn');
    const err   = document.getElementById('loginError');
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;

    err.style.display = 'none';
    if (!email || !pass) {
      err.textContent = 'Please enter email and password.';
      err.style.display = 'block'; return;
    }

    UI.loading(btn, true);
    try {
      const res = await API.post('/auth/login', { email, password: pass });
      Auth.save(res.data);
      window.location.href = res.data.user.role === 'admin'
        ? 'pages/admin-dashboard.html'
        : 'pages/teacher-dashboard.html';
    } catch (e) {
      err.textContent = e.message || 'Invalid email or password.';
      err.style.display = 'block';
    } finally {
      UI.loading(btn, false);
    }
  }
</script>
</body>
</html>
