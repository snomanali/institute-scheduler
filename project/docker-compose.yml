version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: ism_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       institute_scheduler
      POSTGRES_USER:     ism_user
      POSTGRES_PASSWORD: ism_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/001_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/002_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ism_user -d institute_scheduler"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: ism_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:               production
      PORT:                   5000
      DB_HOST:                postgres
      DB_PORT:                5432
      DB_NAME:                institute_scheduler
      DB_USER:                ism_user
      DB_PASSWORD:            ism_password_change_me
      JWT_SECRET:             CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_32_CHARS
      JWT_REFRESH_SECRET:     CHANGE_THIS_TO_ANOTHER_LONG_RANDOM_SECRET
      JWT_EXPIRES_IN:         8h
      JWT_REFRESH_EXPIRES_IN: 7d
      CLIENT_URL:             http://localhost
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    ports:
      - "5000:5000"

  nginx:
    image: nginx:alpine
    container_name: ism_nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro

volumes:
  postgres_data:
  uploads_data:
  logs_data:
